<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Voice Reader Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      padding: 20px;
      border-bottom: 1px solid #e0e0e0;
    }

    .mode-section {
      padding: 20px;
      border-bottom: 1px solid #e0e0e0;
    }

    .mode-section:last-of-type {
      border-bottom: none;
    }

    .mode-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 15px;
      color: #2c3e50;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #555;
    }

    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      background-color: white;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus {
      outline: none;
      border-color: #4CAF50;
      box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
    }

    .range-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="range"] {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: #ddd;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #4CAF50;
      cursor: pointer;
      transition: background 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #45a049;
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #4CAF50;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    input[type="range"]::-moz-range-thumb:hover {
      background: #45a049;
    }

    .range-value {
      min-width: 40px;
      text-align: right;
      font-size: 14px;
      font-weight: 500;
      color: #666;
    }

    .button-group {
      padding: 20px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      background: #fafafa;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    #saveBtn {
      background-color: #4CAF50;
      color: white;
    }

    #saveBtn:hover {
      background-color: #45a049;
    }

    #saveBtn:active {
      background-color: #3d8b40;
    }

    .status {
      padding: 10px 20px;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
      color: #4CAF50;
      font-weight: 500;
    }

    .status.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Voice Reader Settings</h1>

    <div class="mode-section">
      <div class="mode-title">TTS Engine</div>
      <div class="form-group">
        <label for="engine-select">Engine</label>
        <select id="engine-select">
          <option value="auto">Auto (Piper, fallback to System)</option>
          <option value="piper">Piper neural TTS</option>
          <option value="system">System (Web Speech)</option>
        </select>
      </div>
      <div class="form-group" id="piper-voice-group" style="display: none;">
        <label for="piper-voice">Piper Voice</label>
        <select id="piper-voice">
          <option value="en_US-hfc_female-medium">HFC Female (US) - Medium</option>
          <option value="en_US-hfc_male-medium">HFC Male (US) - Medium</option>
          <option value="en_US-lessac-high">Lessac (US) - High Quality</option>
          <option value="en_US-amy-medium">Amy (US) - Medium</option>
          <option value="en_GB-jenny_dioco-medium">Jenny (British) - Medium</option>
        </select>
        <small style="display: block; margin-top: 8px; color: #999; font-size: 12px;">Note: First use downloads the voice model (30-60 MB). Models are cached locally afterwards.</small>
      </div>
    </div>

    <div class="mode-section">
      <div class="mode-title">Explanatory Mode</div>
      <div class="form-group">
        <label for="explanatory-voice">Voice</label>
        <select id="explanatory-voice"></select>
      </div>
      <div class="form-group">
        <label for="explanatory-rate">Speed</label>
        <div class="range-container">
          <input type="range" id="explanatory-rate" min="0.5" max="2.0" step="0.1" value="1.0">
          <span class="range-value" id="explanatory-rate-value">1.0x</span>
        </div>
      </div>
      <div class="form-group">
        <label for="explanatory-pitch">Pitch</label>
        <div class="range-container">
          <input type="range" id="explanatory-pitch" min="0" max="2" step="0.1" value="1.0">
          <span class="range-value" id="explanatory-pitch-value">1.0</span>
        </div>
      </div>
    </div>

    <div class="mode-section">
      <div class="mode-title">Storytelling Mode</div>
      <div class="form-group">
        <label for="storytelling-voice">Voice</label>
        <select id="storytelling-voice"></select>
      </div>
      <div class="form-group">
        <label for="storytelling-rate">Speed</label>
        <div class="range-container">
          <input type="range" id="storytelling-rate" min="0.5" max="2.0" step="0.1" value="0.9">
          <span class="range-value" id="storytelling-rate-value">0.9x</span>
        </div>
      </div>
      <div class="form-group">
        <label for="storytelling-pitch">Pitch</label>
        <div class="range-container">
          <input type="range" id="storytelling-pitch" min="0" max="2" step="0.1" value="1.1">
          <span class="range-value" id="storytelling-pitch-value">1.1</span>
        </div>
      </div>
    </div>

    <div class="button-group">
      <button id="saveBtn">Save</button>
    </div>

    <div class="status hidden" id="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
