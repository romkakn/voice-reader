<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480">
  <rect width="1200" height="480" fill="#f0fff8"/>
  <!-- Brain / neural nodes -->
  <g transform="translate(200,140)">
    <!-- Nodes -->
    <circle cx="0" cy="60" r="18" fill="#06d6a0"/>
    <circle cx="0" cy="120" r="18" fill="#06d6a0"/>
    <circle cx="90" cy="30" r="18" fill="#44c9a0"/>
    <circle cx="90" cy="90" r="18" fill="#44c9a0"/>
    <circle cx="90" cy="150" r="18" fill="#44c9a0"/>
    <circle cx="180" cy="60" r="18" fill="#06d6a0"/>
    <circle cx="180" cy="120" r="18" fill="#06d6a0"/>
    <!-- Connections -->
    <line x1="18" y1="60" x2="72" y2="30" stroke="#a8f0c6" stroke-width="2"/>
    <line x1="18" y1="60" x2="72" y2="90" stroke="#a8f0c6" stroke-width="2"/>
    <line x1="18" y1="60" x2="72" y2="150" stroke="#a8f0c6" stroke-width="2"/>
    <line x1="18" y1="120" x2="72" y2="30" stroke="#a8f0c6" stroke-width="2"/>
    <line x1="18" y1="120" x2="72" y2="90" stroke="#a8f0c6" stroke-width="2"/>
    <line x1="18" y1="120" x2="72" y2="150" stroke="#a8f0c6" stroke-width="2"/>
    <line x1="108" y1="30" x2="162" y2="60" stroke="#a8f0c6" stroke-width="2"/>
    <line x1="108" y1="90" x2="162" y2="60" stroke="#a8f0c6" stroke-width="2"/>
    <line x1="108" y1="150" x2="162" y2="60" stroke="#a8f0c6" stroke-width="2"/>
    <line x1="108" y1="30" x2="162" y2="120" stroke="#a8f0c6" stroke-width="2"/>
    <line x1="108" y1="90" x2="162" y2="120" stroke="#a8f0c6" stroke-width="2"/>
    <line x1="108" y1="150" x2="162" y2="120" stroke="#a8f0c6" stroke-width="2"/>
  </g>
  <!-- Piper label -->
  <rect x="155" y="320" width="290" height="36" rx="8" fill="#06d6a0" opacity="0.2"/>
  <text x="300" y="344" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#2d6a4f" text-anchor="middle">Piper VITS Neural Model</text>
  <!-- Arrow -->
  <path d="M520 240 L620 240" fill="none" stroke="#b0c4de" stroke-width="3" stroke-dasharray="7 4"/>
  <polygon points="620,233 638,240 620,247" fill="#b0c4de"/>
  <!-- WASM box -->
  <rect x="640" y="100" width="340" height="280" rx="16" fill="#fff" stroke="#6c7ef7" stroke-width="2.5"/>
  <rect x="640" y="100" width="340" height="50" rx="16" fill="#6c7ef7"/>
  <rect x="640" y="130" width="340" height="20" fill="#6c7ef7"/>
  <text x="810" y="132" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">WebAssembly</text>
  <!-- waveform inside box -->
  <polyline points="670,240 695,200 720,270 745,210 770,255 795,215 820,260 845,205 870,250 895,220 920,245 945,230" fill="none" stroke="#6c7ef7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- No cloud -->
  <circle cx="950" cy="130" r="40" fill="#ffe8e8" stroke="#ef476f" stroke-width="2"/>
  <path d="M928 135 Q920 120 935 112 Q940 98 955 100 Q960 90 972 95 Q985 88 990 100 Q1002 100 1002 112 Q1008 124 998 130 Z" fill="#ef476f" opacity="0.3"/>
  <line x1="925" y1="105" x2="975" y2="155" stroke="#ef476f" stroke-width="4" stroke-linecap="round"/>
  <text x="600" y="430" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#1b4332" text-anchor="middle">Offline Neural TTS — Piper VITS + WebAssembly in Browser</text>
</svg>
