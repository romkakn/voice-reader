<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480">
  <rect width="1200" height="480" fill="#f0f4ff"/>
  <!-- Chrome circle -->
  <circle cx="600" cy="220" r="120" fill="#e8eeff" stroke="#6c7ef7" stroke-width="3"/>
  <!-- Speaker icon center -->
  <rect x="565" y="185" width="30" height="70" rx="4" fill="#6c7ef7"/>
  <polygon points="595,185 635,155 635,285 595,255" fill="#6c7ef7"/>
  <!-- Sound waves -->
  <path d="M645 185 Q670 220 645 255" fill="none" stroke="#6c7ef7" stroke-width="4" stroke-linecap="round"/>
  <path d="M660 170 Q695 220 660 270" fill="none" stroke="#a0abf9" stroke-width="4" stroke-linecap="round"/>
  <path d="M675 155 Q720 220 675 285" fill="none" stroke="#c5cbfb" stroke-width="3" stroke-linecap="round"/>
  <!-- Orbit dots -->
  <circle cx="480" cy="130" r="18" fill="#ffd166"/>
  <circle cx="720" cy="130" r="18" fill="#06d6a0"/>
  <circle cx="480" cy="310" r="18" fill="#ef476f"/>
  <circle cx="720" cy="310" r="18" fill="#ffd166"/>
  <!-- Connecting lines -->
  <line x1="498" y1="130" x2="530" y2="165" stroke="#c5cbfb" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="702" y1="130" x2="670" y2="165" stroke="#c5cbfb" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="498" y1="310" x2="530" y2="278" stroke="#c5cbfb" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="702" y1="310" x2="670" y2="278" stroke="#c5cbfb" stroke-width="2" stroke-dasharray="4 3"/>
  <!-- Label -->
  <text x="600" y="400" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#3a4080" text-anchor="middle">Voice Reader — Free Chrome TTS Extension</text>
  <text x="600" y="430" font-family="Arial,sans-serif" font-size="15" fill="#6c7ef7" text-anchor="middle">Listen to any text, offline, no account needed</text>
</svg>
