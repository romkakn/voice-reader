<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="-apple-system,Segoe UI,Arial,sans-serif">
  <rect width="1200" height="750" fill="#f1f3f4"/>
  <!-- browser window -->
  <rect x="40" y="40" width="1120" height="670" rx="14" fill="#ffffff" stroke="#dadce0"/>
  <!-- tab bar -->
  <rect x="40" y="40" width="1120" height="52" rx="14" fill="#dee1e6"/>
  <rect x="40" y="70" width="1120" height="22" fill="#dee1e6"/>
  <rect x="60" y="52" width="220" height="34" rx="8" fill="#ffffff"/>
  <circle cx="80" cy="69" r="6" fill="#5f6368"/>
  <text x="98" y="74" font-size="14" fill="#3c4043">Extensions</text>
  <circle cx="64" cy="20" r="0" />
  <!-- address bar -->
  <rect x="60" y="104" width="1080" height="40" rx="20" fill="#f1f3f4"/>
  <circle cx="86" cy="124" r="8" fill="none" stroke="#5f6368" stroke-width="2"/>
  <text x="110" y="129" font-size="15" fill="#3c4043">chrome://extensions</text>
  <!-- page header -->
  <text x="80" y="210" font-size="26" font-weight="600" fill="#202124">Extensions</text>
  <!-- developer mode toggle (OFF) -->
  <text x="940" y="206" font-size="16" fill="#3c4043">Developer mode</text>
  <rect x="1060" y="192" width="48" height="24" rx="12" fill="#bdc1c6"/>
  <circle cx="1072" cy="204" r="9" fill="#ffffff"/>
  <!-- highlight + arrow -->
  <rect x="930" y="182" width="190" height="44" rx="10" fill="none" stroke="#1a73e8" stroke-width="3"/>
  <path d="M 760 320 C 880 320 980 270 1040 232" fill="none" stroke="#1a73e8" stroke-width="4"/>
  <path d="M 1040 232 l -22 2 l 12 16 z" fill="#1a73e8"/>
  <text x="760" y="350" font-size="18" fill="#1a73e8" font-weight="600">Developer mode</text>
  <!-- empty state card -->
  <rect x="80" y="400" width="1040" height="160" rx="12" fill="#fafafd" stroke="#e8eaed"/>
  <text x="600" y="490" font-size="18" fill="#9aa0a6" text-anchor="middle">עדיין אין תוספים מותקנים</text>
  <!-- caption -->
  <text x="1120" y="690" font-size="24" font-weight="700" fill="#202124" text-anchor="end" direction="rtl">שלב 1 — פותחים chrome://extensions</text>
</svg>
